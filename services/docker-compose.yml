version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bondit}
      POSTGRES_USER: ${POSTGRES_USER:-bondit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bondit_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - SOLANA_WS_URL=${SOLANA_WS_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bondit}:${POSTGRES_PASSWORD:-bondit_dev}@postgres:5432/${POSTGRES_DB:-bondit}
      - REDIS_URL=redis://redis:6379
      - INDEXER_PORT=${INDEXER_PORT:-3001}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - INDEXER_RATE_LIMIT_WINDOW_MS=${INDEXER_RATE_LIMIT_WINDOW_MS:-60000}
      - INDEXER_RATE_LIMIT_MAX_REQUESTS=${INDEXER_RATE_LIMIT_MAX_REQUESTS:-120}
    ports:
      - "${INDEXER_PORT:-3001}:${INDEXER_PORT:-3001}"
    depends_on:
      - postgres
      - redis

  keeper:
    build:
      context: ./keeper
      dockerfile: Dockerfile
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - KEEPER_KEYPAIR_PATH=/app/keypair.json
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bondit}:${POSTGRES_PASSWORD:-bondit_dev}@postgres:5432/${POSTGRES_DB:-bondit}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  bondit-ai:
    build:
      context: ./openclaw-ai
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bondit}:${POSTGRES_PASSWORD:-bondit_dev}@postgres:5432/${POSTGRES_DB:-bondit}
      - AI_PORT=${AI_PORT:-3002}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - AI_RATE_LIMIT_WINDOW_MS=${AI_RATE_LIMIT_WINDOW_MS:-60000}
      - AI_RATE_LIMIT_MAX_REQUESTS=${AI_RATE_LIMIT_MAX_REQUESTS:-30}
    ports:
      - "${AI_PORT:-3002}:${AI_PORT:-3002}"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
