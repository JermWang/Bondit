## render.yaml — BondIt.lol infrastructure-as-code for Render
## https://render.com/docs/blueprint-spec

services:
  # ── Indexer API ─────────────────────────────────────────────────────────
  - type: web
    name: bondit-indexer
    runtime: node
    buildCommand: npm install && npm run build --workspace @bondit/sdk && npm run build --workspace @bondit/indexer
    startCommand: cd services/indexer && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bondit-db
          property: connectionString
      - key: SOLANA_RPC_URL
        sync: false
      - key: PORT
        value: "4000"

  # ── Vanity Background Worker ────────────────────────────────────────────
  - type: worker
    name: bondit-vanity-worker
    runtime: docker
    dockerfilePath: services/vanity-worker/Dockerfile
    dockerContext: services/vanity-worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bondit-db
          property: connectionString
      - key: VANITY_SUFFIX
        value: "LoL"
      - key: VANITY_BACKLOG_TARGET
        value: "100"
      - key: VANITY_WORKERS
        value: "3"
      - key: VANITY_CHECK_INTERVAL_MS
        value: "10000"
      - key: LAUNCH_FACTORY_PROGRAM_ID
        value: ""

  # ── OpenClaw AI Advisory Service ──────────────────────────────────────
  - type: web
    name: bondit-openclaw-ai
    runtime: node
    buildCommand: npm install && npm run build --workspace @bondit/sdk && npm run build --workspace @bondit/ai
    startCommand: cd services/openclaw-ai && npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INDEXER_API_URL
        value: "https://bondit-indexer.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://www.bondit.lol,https://bondit.lol"
      - key: AI_DAILY_TOKEN_BUDGET
        value: "500000"
      - key: PORT
        value: "3002"


databases:
  - name: bondit-db
    plan: free
    databaseName: bondit
    postgresMajorVersion: "16"
